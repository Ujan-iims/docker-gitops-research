name: GitOps CI/CD Pipeline (with OPA)

on:
  push:
    branches: [ "main" ]

env:
  OPA_VERSION: "0.60.0"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Record Start Time
        run: echo "START=$(date +%s)" >> $GITHUB_ENV

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm ci --only=production

      - name: Run Tests
        run: npm test

      - name: Build Docker Image
        run: docker build -f Dockerfile.gitops -t thesis-gitops:${{ github.sha }} .

      # --- OPA POLICY GATE ---
      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/v${{ env.OPA_VERSION }}/opa_linux_amd64_static
          chmod +x opa && sudo mv opa /usr/local/bin/opa

      - name: Prepare OPA Input
        run: |
          cat > input.json << 'EOF'
          {
            "containerName": "thesis-gitops-app",
            "image": "node:18-alpine",           # Test P3
            "securityContext": {
              "privileged": false,               # Test P1
              "runAsUser": 1001                  # Test P2
            }
          }
          EOF

      - name: Run OPA Policy Check (Timed)
        run: |
          OPA_START=$(date +%s%3N)

          VIOLATIONS=$(opa eval \
            --data policy.rego \
            --input input.json \
            --format raw \
            "count(data.thesis.deny)")

          OPA_END=$(date +%s%3N)
          OPA_EVAL_TIME=$((OPA_END - OPA_START))

          echo "OPA Violations: $VIOLATIONS"
          echo "OPA Evaluation Time: ${OPA_EVAL_TIME}ms"

          # Save to env for Collect Metrics step
          echo "VIOLATIONS=$VIOLATIONS" >> $GITHUB_ENV
          echo "OPA_EVAL_TIME=$OPA_EVAL_TIME" >> $GITHUB_ENV

          if [ "$VIOLATIONS" -gt "0" ]; then
            echo "OPA POLICY GATE: BLOCKED - $VIOLATIONS violation(s) found"
            exit 1
          else
            echo "OPA POLICY GATE: PASSED"
          fi

      - name: Record Deployment Time
        run: |
          END=$(date +%s)
          echo "Deployment Time: $((END - START))s"
          echo "Status: success"
          echo "OPA Enforced: true"
          echo "Security Policies: no-privileged, no-root, approved-images"
      
      - name: Collect Metrics
        if: always()
        run: |
          END=$(date +%s)
          DURATION=$((END - START))
          echo "### GitOps Pipeline Metrics" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Run Number | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployment Time | ${DURATION}s |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | success |" >> $GITHUB_STEP_SUMMARY
          echo "| OPA Enforced | true |" >> $GITHUB_STEP_SUMMARY
          echo "| OPA Violations | $VIOLATIONS |" >> $GITHUB_STEP_SUMMARY
          echo "| OPA Eval Time | ${OPA_EVAL_TIME}ms |" >> $GITHUB_STEP_SUMMARY
          echo "| Policies Checked | P1-no-privileged, P2-no-root, P3-approved-image |" >> $GITHUB_STEP_SUMMARY
